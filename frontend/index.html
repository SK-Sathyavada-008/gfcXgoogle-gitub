<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub User Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(35, 134, 54, 0.18), transparent 34rem),
                radial-gradient(circle at bottom right, rgba(88, 166, 255, 0.12), transparent 32rem),
                #0d1117;
            color: #c9d1d9;
        }

        .fade-in {
            animation: fadeIn 0.35s ease-out both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .github-input {
            background-color: #0d1117;
            border-color: #30363d;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .github-input:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.22);
            outline: none;
        }

        .btn-primary {
            background-color: #238636;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-primary:hover {
            background-color: #2ea043;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            cursor: not-allowed;
            opacity: 0.55;
            transform: none;
        }
    </style>
</head>
<body class="min-h-screen p-4">
    <main id="root" class="mx-auto flex min-h-screen w-full max-w-4xl items-center py-8"></main>

    <script type="text/babel">
        const { useState } = React;

        const formatNumber = (value) => new Intl.NumberFormat().format(value || 0);

        const formatDate = (value) => {
            if (!value) return 'Unknown';
            return new Intl.DateTimeFormat(undefined, {
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            }).format(new Date(value));
        };

        function App() {
            const [username, setUsername] = useState('');
            const [loading, setLoading] = useState(false);
            const [profile, setProfile] = useState(null);
            const [repos, setRepos] = useState([]);
            const [error, setError] = useState('');

            const fetchGitHubUser = async (event) => {
                event.preventDefault();

                const cleanUsername = username.trim().replace(/^@/, '');
                if (!cleanUsername) return;

                setLoading(true);
                setProfile(null);
                setRepos([]);
                setError('');

                try {
                    const userResponse = await fetch(`https://api.github.com/users/${encodeURIComponent(cleanUsername)}`);

                    if (userResponse.status === 404) {
                        throw new Error('No GitHub user found with that username.');
                    }

                    if (!userResponse.ok) {
                        throw new Error('GitHub could not return that profile right now.');
                    }

                    const userData = await userResponse.json();
                    const reposResponse = await fetch(
                        `https://api.github.com/users/${encodeURIComponent(cleanUsername)}/repos?sort=updated&per_page=6`
                    );

                    if (!reposResponse.ok) {
                        throw new Error('Profile loaded, but repositories could not be fetched.');
                    }

                    const repoData = await reposResponse.json();
                    setProfile(userData);
                    setRepos(repoData);
                    setUsername(cleanUsername);
                } catch (err) {
                    setError(err.message || 'Something went wrong while fetching this user.');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="w-full space-y-8">
                    <section className="space-y-3 text-center">
                        <p className="text-sm font-semibold uppercase tracking-[0.24em] text-[#7ee787]">GitHub Lookup</p>
                        <h1 className="text-4xl font-extrabold text-white sm:text-5xl">Find a GitHub user</h1>
                        <p className="mx-auto max-w-2xl text-base text-[#8b949e] sm:text-lg">
                            Search any public username and see their profile, stats, and recent repositories.
                        </p>
                    </section>

                    <form onSubmit={fetchGitHubUser} className="mx-auto flex max-w-2xl flex-col gap-3 sm:flex-row">
                        <input
                            type="text"
                            placeholder="e.g. torvalds"
                            className="github-input min-w-0 flex-1 rounded-lg border px-4 py-3 text-lg text-white"
                            value={username}
                            onChange={(event) => setUsername(event.target.value)}
                            disabled={loading}
                            autoComplete="off"
                        />
                        <button
                            type="submit"
                            className="btn-primary rounded-lg px-6 py-3 text-lg font-semibold text-white shadow-lg"
                            disabled={loading || !username.trim()}
                        >
                            {loading ? 'Fetching...' : 'Fetch User'}
                        </button>
                    </form>

                    {loading && (
                        <div className="mx-auto max-w-2xl rounded-xl border border-[#30363d] bg-[#161b22] p-6 shadow-xl">
                            <div className="flex animate-pulse items-center gap-4">
                                <div className="h-20 w-20 rounded-full bg-[#30363d]"></div>
                                <div className="flex-1 space-y-3">
                                    <div className="h-5 w-1/2 rounded bg-[#30363d]"></div>
                                    <div className="h-4 w-1/3 rounded bg-[#30363d]"></div>
                                    <div className="h-4 w-2/3 rounded bg-[#30363d]"></div>
                                </div>
                            </div>
                        </div>
                    )}

                    {error && (
                        <div className="fade-in mx-auto max-w-2xl rounded-lg border border-red-500/50 bg-red-950/40 p-4 text-center text-red-100">
                            {error}
                        </div>
                    )}

                    {profile && (
                        <section className="fade-in rounded-xl border border-[#30363d] bg-[#161b22] shadow-2xl">
                            <div className="grid gap-6 p-6 md:grid-cols-[220px_1fr] md:p-8">
                                <aside className="space-y-4 text-center md:text-left">
                                    <img
                                        src={profile.avatar_url}
                                        alt={`${profile.login}'s avatar`}
                                        className="mx-auto h-36 w-36 rounded-full border border-[#30363d] md:mx-0"
                                    />
                                    <a
                                        href={profile.html_url}
                                        target="_blank"
                                        rel="noreferrer"
                                        className="block rounded-md border border-[#30363d] bg-[#21262d] px-4 py-2 text-center font-semibold text-white transition hover:bg-[#30363d]"
                                    >
                                        View on GitHub
                                    </a>
                                </aside>

                                <div className="space-y-6">
                                    <div>
                                        <h2 className="text-3xl font-bold text-white">{profile.name || profile.login}</h2>
                                        <p className="text-lg text-[#58a6ff]">@{profile.login}</p>
                                        {profile.bio && <p className="mt-3 max-w-2xl text-[#c9d1d9]">{profile.bio}</p>}
                                    </div>

                                    <div className="grid gap-3 sm:grid-cols-3">
                                        <div className="rounded-lg border border-[#30363d] bg-[#0d1117] p-4">
                                            <p className="text-2xl font-bold text-white">{formatNumber(profile.public_repos)}</p>
                                            <p className="text-sm text-[#8b949e]">Repositories</p>
                                        </div>
                                        <div className="rounded-lg border border-[#30363d] bg-[#0d1117] p-4">
                                            <p className="text-2xl font-bold text-white">{formatNumber(profile.followers)}</p>
                                            <p className="text-sm text-[#8b949e]">Followers</p>
                                        </div>
                                        <div className="rounded-lg border border-[#30363d] bg-[#0d1117] p-4">
                                            <p className="text-2xl font-bold text-white">{formatNumber(profile.following)}</p>
                                            <p className="text-sm text-[#8b949e]">Following</p>
                                        </div>
                                    </div>

                                    <div className="grid gap-2 text-sm text-[#8b949e] sm:grid-cols-2">
                                        <p><span className="font-semibold text-[#c9d1d9]">Company:</span> {profile.company || 'Not listed'}</p>
                                        <p><span className="font-semibold text-[#c9d1d9]">Location:</span> {profile.location || 'Not listed'}</p>
                                        <p><span className="font-semibold text-[#c9d1d9]">Blog:</span> {profile.blog ? <a className="text-[#58a6ff] hover:underline" href={profile.blog.startsWith('http') ? profile.blog : `https://${profile.blog}`} target="_blank" rel="noreferrer">{profile.blog}</a> : 'Not listed'}</p>
                                        <p><span className="font-semibold text-[#c9d1d9]">Joined:</span> {formatDate(profile.created_at)}</p>
                                    </div>
                                </div>
                            </div>

                            <div className="border-t border-[#30363d] p-6 md:p-8">
                                <h3 className="mb-4 text-xl font-bold text-white">Recent repositories</h3>
                                {repos.length > 0 ? (
                                    <div className="grid gap-3 md:grid-cols-2">
                                        {repos.map((repo) => (
                                            <a
                                                key={repo.id}
                                                href={repo.html_url}
                                                target="_blank"
                                                rel="noreferrer"
                                                className="rounded-lg border border-[#30363d] bg-[#0d1117] p-4 transition hover:border-[#58a6ff]"
                                            >
                                                <div className="flex items-start justify-between gap-3">
                                                    <h4 className="font-semibold text-[#58a6ff]">{repo.name}</h4>
                                                    <span className="shrink-0 text-sm text-[#8b949e]">{formatNumber(repo.stargazers_count)} stars</span>
                                                </div>
                                                <p className="mt-2 line-clamp-2 text-sm text-[#8b949e]">
                                                    {repo.description || 'No description provided.'}
                                                </p>
                                                <div className="mt-3 flex flex-wrap gap-3 text-xs text-[#8b949e]">
                                                    {repo.language && <span>{repo.language}</span>}
                                                    <span>Updated {formatDate(repo.updated_at)}</span>
                                                </div>
                                            </a>
                                        ))}
                                    </div>
                                ) : (
                                    <p className="text-[#8b949e]">This user has no public repositories to show.</p>
                                )}
                            </div>
                        </section>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
